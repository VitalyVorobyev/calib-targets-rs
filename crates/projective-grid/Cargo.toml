[package]
name = "projective-grid"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
readme = "README.md"
documentation.workspace = true
description = "Generic 2D projective grid graph construction, traversal, and homography tools"
keywords = ["computer-vision", "geometry", "homography", "grid", "calibration"]
categories = ["computer-vision", "science", "algorithms"]

[dependencies]
kiddo = { workspace = true }
nalgebra = { workspace = true }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }

[features]
tracing = ["dep:tracing"]

[dependencies.tracing]
workspace = true
optional = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
