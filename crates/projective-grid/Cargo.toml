[package]
name = "projective-grid"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
readme = "README.md"
documentation.workspace = true
description = "Generic 2D projective grid graph construction, traversal, and homography tools"
keywords = ["computer-vision", "geometry", "homography", "grid", "calibration"]
categories = ["computer-vision", "science", "algorithms"]

[dependencies]
delaunator = { workspace = true }
kiddo = { workspace = true }
nalgebra = { workspace = true }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }


[dev-dependencies]
criterion = { workspace = true }

[[bench]]
name = "grow"
harness = false

[[bench]]
name = "homography"
harness = false

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
