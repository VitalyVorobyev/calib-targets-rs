# Image set for the chessboard grid-builder regression / performance bench.
#
# Only the chessboard detector is exercised — ChArUco, marker, and puzzle
# detectors all consume the same chessboard grid output, so a chessboard
# regression covers them implicitly for grid-builder changes.
#
# `kind = "public"` images live in testdata/ and have committed baselines
# under crates/calib-targets-bench/baselines/chessboard.json.
# `kind = "private"` images live in privatedata/ (gitignored); their
# baselines live alongside them under privatedata/baselines/ (also
# gitignored).
#
# Stitched entries: the on-disk file is a horizontal tiling of `count`
# sub-snaps, each `snap_width × snap_height`. Each sub-snap is detected
# independently and gets its own baseline entry keyed by `path#snap_index`.

[[image]]
path = "testdata/mid.png"
kind = "public"
note = "Simple, well-lit reference frame — sanity baseline."

[[image]]
