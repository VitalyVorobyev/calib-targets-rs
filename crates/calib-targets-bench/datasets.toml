# Extreme view-angle PuzzleBoard frames. The cross-tile pattern produces
# ChESS X-junctions at every tile-corner intersection, so detect_chessboard
# should still build a labelled grid; we use these as a stress test for
# perspective foreshortening and (in example2) radial distortion.
[[image]]
path = "testdata/puzzleboard_reference/example1.png"
kind = "public"
note = "PuzzleBoard at extreme oblique perspective (~45° tilt)."

[[image]]
path = "testdata/puzzleboard_reference/example2.png"
kind = "public"
note = "PuzzleBoard with visible radial distortion — Stage 6 refusal expected."

[[image]]
path = "testdata/puzzleboard_reference/example3.png"
kind = "public"
note = "PuzzleBoard, third extreme-angle reference frame."

# Low-res PuzzleBoard, moderate perspective.
# Stitched composite: 6 × 720 × 540 sub-snaps. Detector consumes 2× upscale.
[[image]]
path = "privatedata/130x130_puzzle/target_15.png"
kind = "private"
upscale = 2
stitched = { count = 6, snap_width = 720, snap_height = 540 }
note = "6 puzzle sub-snaps, 2× upscale before detection."

# Challenging-focus ChArUco, six camera positions.
