# Low-res PuzzleBoard, moderate perspective. Full dataset: every
# `target_*.png` is a stitched composite of 6 × 720 × 540 sub-snaps; the
# detector consumes a 2× upscale. The glob expands to one entry per frame at
# load (committed baselines cover target_15 only; other frames have no
# baseline and surface as detection-quality signals in the studio).
[[image]]
glob = "privatedata/130x130_puzzle/target_*.png"
kind = "private"
dataset = "130x130_puzzle"
upscale = 2
stitched = { count = 6, snap_width = 720, snap_height = 540 }
min_labelled = 250
note = "PuzzleBoard frames, 6 sub-snaps each, 2× upscale before detection."

# Challenging-focus ChArUco, six camera positions per frame. Full dataset:
# every `target_*.png` is a stitched composite of 6 × 720 × 540 sub-snaps,
# native resolution. Committed baselines cover target_7 only.
[[image]]
glob = "privatedata/3536119669/target_*.png"
kind = "private"
dataset = "3536119669"
stitched = { count = 6, snap_width = 720, snap_height = 540 }
note = "ChArUco frames, 6 sub-snaps each, native resolution."

# Single known-regression frame for overlay review. A 6 × 720 × 540 stitched
# AprilTag/ChArUco composite with a dense, fine cell pitch, so it needs a 2×
# upscale (native resolution detects zero ChESS corners). No committed baseline
# — surfaces as a detection-quality signal in the studio.
[[image]]
path = "privatedata/target_0.png"
kind = "private"
dataset = "target_0"
upscale = 2
stitched = { count = 6, snap_width = 720, snap_height = 540 }
note = "Known regression — single AprilTag/ChArUco frame, 6 sub-snaps, 2× upscale, under review."
