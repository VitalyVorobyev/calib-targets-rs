language = "C"
cpp_compat = true
pragma_once = true
include_guard = "CALIB_TARGETS_FFI_H"
usize_is_size_t = true
sys_includes = ["stddef.h", "stdint.h"]
autogen_warning = "/* Auto-generated by `cargo run -p calib-targets-ffi --bin generate-ffi-header`. Do not edit manually. */"

[parse]
parse_deps = false

[export]
include = [
    "CT_FALSE",
    "CT_TRUE",
    "ct_status_t",
    "ct_optional_u32_t",
    "ct_optional_bool_t",
    "ct_optional_f32_t",
    "ct_gray_image_u8_t",
    "ct_version_string",
    "ct_last_error_message",
]
item_types = ["constants", "enums", "structs", "functions"]
