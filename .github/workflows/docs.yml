name: Publish Rust Docs

on:
  push:
    branches: [ main ]
    tags: [ '*' ]        # also publish on tag push
  workflow_dispatch:     # allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write        # required for OIDC deploy authentication

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-docs
          targets: wasm32-unknown-unknown

      - name: Install mdBook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build documentation
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: |
          cargo doc --workspace --all-features --no-deps
          echo '<meta http-equiv="refresh" content="0; url=calib_targets_core/index.html">' > target/doc/index.html
          mdbook build book

      - name: Build playground (WASM + demo)
        run: |
          ./scripts/build-wasm.sh
          cd demo
          bun install --frozen-lockfile
          bun run build

      - name: Assemble Pages artifact
        run: |
          mkdir -p public/api public/playground
          rsync -a target/doc/ public/api/
          rsync -a book/book/ public/
          rsync -a demo/dist/ public/playground/

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
