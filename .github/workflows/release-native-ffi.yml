name: Release native FFI archives

on:
  push:
    tags:
      - "v*"

jobs:
  build-archives:
    name: Build native archive (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check generated FFI header
        run: cargo run -p calib-targets-ffi --bin generate-ffi-header -- --check

      - name: Native smoke
        if: runner.os != 'Windows'
        run: cargo test -p calib-targets-ffi --test native_consumer_smoke -- --nocapture

      - name: CMake consumer smoke
        run: cargo test -p calib-targets-ffi --test cmake_consumer_smoke -- --nocapture

      - name: Release archive smoke
        run: cargo test -p calib-targets-ffi --test release_archive_smoke -- --ignored --nocapture

      - name: Build release archive
        shell: bash
        run: |
          cargo build -p calib-targets-ffi --release
          mkdir -p dist
          cargo run -p calib-targets-ffi --bin package-release-archive -- \
            --lib-dir target/release \
            --output-dir dist
          ls -l dist

      - name: Upload native archive
        uses: actions/upload-artifact@v4
        with:
          name: native-ffi-${{ matrix.os }}
          path: dist/*

  publish:
    name: Publish native release assets
    needs: [build-archives]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Download all native archives
        uses: actions/download-artifact@v4
        with:
          pattern: native-ffi-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/releases/ffi-c-api-release-draft.md
          files: dist/*
          fail_on_unmatched_files: true
